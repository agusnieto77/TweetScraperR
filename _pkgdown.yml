  - getTweetsCites
  - getTweetsReplies
  - getTweetsRetweets
  - getTweetsData
  - getTweetsData2
  - getTweetsImages
  - getUsersData
  - getUsersFullData
  - getScrollExtract
  - getScrollExtractUrls
  - getUrlsTweetsSearch
